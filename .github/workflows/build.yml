name: Build PrivacyLens Windows EXE
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set Up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow psutil pywin32

    - name: Compile Standalone Executable
      run: |
        pyinstaller --clean --onefile --noconsole --uac-admin privacylens.py

    - name: Package Artifact and Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/privacylens.exe
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'manual-testing-build' }}
        name: PrivacyLens Release ${{ github.ref_name }}
        body: "Official standalone background engine for the PrivacyLens EXIF Metadata Stripper."
        draft: ${{ github.ref_type != 'tag' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
